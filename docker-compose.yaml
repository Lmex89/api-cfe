services:
  api:
    build: .
    container_name: api-cfe
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-cfe_user}
      DB_PSWD: ${DB_PSWD:-cfe_password}
      DB_NAME: ${DB_NAME:-cfe}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      LOGGING_LEVEL: ${LOGGING_LEVEL:-DEBUG}
    restart: unless-stopped
    networks:
      - db-test-net

networks:
  db-test-net:
    external: true
